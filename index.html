<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Koffiebonenlogboek</title>

  <!-- PWA -->
  <meta name="theme-color" content="#B8510D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Koffielog" />
  <link rel="manifest" href="manifest.json" />

  <!-- Apple touch icon (inline SVG as data URI) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23B8510D'/%3E%3Ctext x='90' y='120' font-size='90' text-anchor='middle'%3E%E2%98%95%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background: #FAF8F5; color: #2C2418; min-height: 100vh; }
    button { font-family: inherit; }
    select { font-family: inherit; }
    input { font-family: inherit; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.15); } }
    .fade-up { animation: fadeUp 0.4s ease both; }

    /* Mobile safe area */
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 16px); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #E8E2D8; border-radius: 3px; }

    /* Tap highlight */
    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <script>
  // ─── Data ───
  const COFFEES = [
    {
      id: "sample-1",
      name: "Gesha Village — Illubahor Forest",
      roaster: "Manhattan Coffee Roasters",
      country: "Ethiopië", region: "Bench Maji Zone, SNNPR", altitude: "1900-2100m",
      producer: "Gesha Village Coffee Estate", variety: "Gesha 1931", processing: "Washed",
      processingDetail: "Volledig gewassen met 36-48 uur fermentatie in schoon water, vervolgens gedroogd op Afrikaanse bedden gedurende 10-14 dagen met regelmatig keren.",
      roastLevel: "Licht", roastType: "Filter",
      tastingNotes: ["Jasmijn", "Bergamot", "Perzik", "Honing"],
      flavorDescription: "Een uitzonderlijk complexe koffie met een bloemig-theeachtig karakter. De jasmijn komt als eerste naar voren in het aroma, gevolgd door een bergamotachtige citrushelderheid. Bij afkoeling ontvouwt zich een perzikzoetheid met een delicate honingachtige afdronk.",
      brewV60: { dose:"15g", water:"250g", temp:"93°C", technique:"Eén-giet swirl-methode: 50g bloom (45s), vervolgens in één continue circulaire giet tot 250g. Lichte swirl na het gieten.", time:"2:45-3:00", grindBricks:"5.10 (85 clicks)", whyThisTechnique:"De eén-giet methode voorkomt over-extractie van de delicate Gesha-bloemnoten en geeft maximale helderheid." },
      brewB75: { dose:"15g", water:"250g", temp:"93°C", technique:"40g bloom (45s) met licht roeren. Eerste giet tot 150g in concentrische cirkels. Tweede giet tot 250g.", time:"3:00-3:15", grindBricks:"5.5 (80 clicks)", agitation:"Minimaal — alleen licht roeren tijdens de bloom." },
      espresso: null, restDays: "10-21 dagen na branddatum", dateAdded: "2025-12-15"
    },
    {
      id: "sample-2",
      name: "La Palma y El Tucán — Sidra Lactic",
      roaster: "Gardelli Specialty Coffees",
      country: "Colombia", region: "Cundinamarca", altitude: "1700-1800m",
      producer: "La Palma y El Tucán", variety: "Sidra", processing: "Lactische fermentatie",
      processingDetail: "Anaërobe lactische fermentatie gedurende 120 uur in verzegelde tanks bij gecontroleerde temperatuur (18-20°C). Langzaam gedroogd op verhoogde bedden.",
      roastLevel: "Licht-medium", roastType: "Omni",
      tastingNotes: ["Aardbeiyoghurt", "Tropisch fruit", "Bruine suiker", "Romig"],
      flavorDescription: "Intensief fruitig met een romige textuur die doet denken aan aardbeien-yoghurt. Mango en passievrucht in de achtergrond, afgerond met bruine suiker.",
      brewV60: { dose:"16g", water:"250g", temp:"91°C", technique:"4:6 methode: eerste 40% (100g) in twee gieten van 50g, tweede 60% (150g) in drie gieten van 50g.", time:"3:15-3:30", grindBricks:"5.5 (80 clicks)", whyThisTechnique:"De 4:6 methode geeft maximale controle over de balans tussen het fruitige zuur en de lactische zoetheid." },
      brewB75: { dose:"16g", water:"250g", temp:"91°C", technique:"40g bloom (40s) met gentle swirl. Eén continue giet tot 250g in langzame concentrische cirkels.", time:"3:00-3:20", grindBricks:"5.3 (78 clicks)", agitation:"Lichte swirl na de bloom. De flat bottom benadrukt de romige body van de lactische fermentatie." },
      espresso: { dose:"18g", yield:"38g", time:"28-32s", temp:"93°C", grindBricks:"2.3 (38 clicks)", tips:"Temperature surfing: flush tot het verwarmingslampje aangaat, wacht 15 seconden, start extractie. De langere ratio opent de fruitige noten." },
      restDays: "14-28 dagen na branddatum (espresso), 7-14 dagen (filter)", dateAdded: "2026-01-08"
    },
    {
      id: "grounded-blackberry-punch",
      name: "Blackberry Punch",
      roaster: "Grounded Craft Coffee",
      country: "Colombia", region: "Acevedo, Huila", altitude: "1700-1800m",
      producer: "Finca Anaya — Familie Aranda Gómez", variety: "Ombligon", processing: "Thermal Shock Co-ferment",
      processingDetail: "Anaërobe fermentatie in gesloten vaten, gevolgd door een co-fermentatie met mosto van verse Andesbramen. Afgerond met een thermische schok die de fermentatie abrupt stopt en de fruitige aromaten intensiveert. Daarna gedroogd op verhoogde bedden gedurende 12-15 dagen.",
      roastLevel: "Licht", roastType: "Filter",
      tastingNotes: ["Bramentaart", "Pomelo", "Passievrucht", "Jam"],
      flavorDescription: "Levendig en complex met een intense fruitigheid die doet denken aan zelfgemaakte bramentaart. Pomelo-citrus geeft helderheid, terwijl passievrucht voor tropische diepte zorgt. Bij afkoeling ontvouwt zich een wijnachtige complexiteit.",
      brewV60: { dose:"15g", water:"250g", temp:"91°C", technique:"4:6 methode (Tetsu Kasuya): 50g bloom (45s). Eerste 40% (100g) in twee gieten van 50g, elke 45 seconden. Tweede 60% (150g) in drie gieten van 50g, elke 45 seconden. Niet swirlen.", time:"3:15-3:45", grindBricks:"5.7 (86 clicks)", whyThisTechnique:"De 4:6 methode geeft controle over de verhouding zoetheid/zuurgraad bij deze intense co-ferment." },
      brewB75: { dose:"15g", water:"250g", temp:"90°C", technique:"50g bloom (45s) met licht roeren. Giet in twee rondes: 150g in langzame concentrische cirkels (tot ~2:00 min), daarna afsluiten met 100g. Geen swirl na de laatste giet.", time:"3:00-3:30", grindBricks:"5.5 (83 clicks)", agitation:"Minimaal — alleen roeren tijdens de bloom. Te veel agitatie versterkt het zuur onnodig bij deze intense co-ferment." },
      espresso: null,
      restDays: "10-21 dagen na branddatum — co-ferments hebben iets meer rust nodig om te integreren", dateAdded: "2026-05-12"
    }
  ];

  // ─── Helpers ───
  const FLAGS = {"Ethiopië":"🇪🇹","Colombia":"🇨🇴","Kenia":"🇰🇪","Guatemala":"🇬🇹","Brazilië":"🇧🇷","Panama":"🇵🇦","Costa Rica":"🇨🇷","Rwanda":"🇷🇼","Burundi":"🇧🇮","Peru":"🇵🇪","Honduras":"🇭🇳","El Salvador":"🇸🇻","Mexico":"🇲🇽","Indonesië":"🇮🇩","India":"🇮🇳","Yemen":"🇾🇪","Bolivia":"🇧🇴","Tanzania":"🇹🇿","Uganda":"🇺🇬","Nicaragua":"🇳🇮"};
  const flag = c => FLAGS[c] || "🌍";

  const procColor = (p="") => {
    const s = p.toLowerCase();
    if (s.includes("washed")||s.includes("gewassen")) return {bg:"#E8F4FD",text:"#1B6B93",border:"#B4D9EF"};
    if (s.includes("natural")||s.includes("naturel")) return {bg:"#FDE8E8",text:"#9B2335",border:"#F5B4B4"};
    if (s.includes("honey")) return {bg:"#FEF3C7",text:"#92400E",border:"#FCD34D"};
    if (s.includes("anaero")||s.includes("lacti")||s.includes("ferment")||s.includes("shock")) return {bg:"#F3E8FF",text:"#6B21A8",border:"#D8B4FE"};
    return {bg:"#F0F0F0",text:"#555",border:"#CCC"};
  };

  const roastGrad = (l="") => {
    const s = l.toLowerCase();
    if (s.includes("licht")&&!s.includes("medium")) return "linear-gradient(135deg,#D4A76A,#C4956A)";
    if (s.includes("licht")&&s.includes("medium")) return "linear-gradient(135deg,#B8865A,#A07050)";
    if (s.includes("medium")&&!s.includes("licht")&&!s.includes("donker")) return "linear-gradient(135deg,#8B6543,#6F4E37)";
    if (s.includes("donker")) return "linear-gradient(135deg,#4A3728,#2C1E14)";
    return "linear-gradient(135deg,#A0845C,#7B6043)";
  };

  // ─── localStorage (replaces window.storage) ───
  const store = {
    get: (k) => { try { const v = localStorage.getItem(k); return v ? {value:v} : null; } catch { return null; } },
    set: (k,v) => { try { localStorage.setItem(k,v); } catch {} }
  };

  // ─── Palette ───
  const P = {cream:"#FAF8F5",warm:"#FFFDF9",ink:"#2C2418",inkL:"#5C4F3D",inkM:"#8C7E6A",accent:"#B8510D",accentL:"#E8DDD0",border:"#E8E2D8",card:"#FFFFFF"};
  const FD = "'Fraunces','Georgia',serif";

  // ─── React App ───
  const {useState, useEffect, useCallback} = React;
  const h = React.createElement;

  function App() {
    const [coffees, setCoffees] = useState([]);
    const [loading, setLoading] = useState(true);
    const [view, setView] = useState("grid");
    const [selected, setSelected] = useState(null);
    const [tab, setTab] = useState("info");
    const [search, setSearch] = useState("");
    const [fCountry, setFCountry] = useState("all");
    const [fProc, setFProc] = useState("all");
    const [fRoast, setFRoast] = useState("all");
    const [compare, setCompare] = useState([]);
    const [showInfo, setShowInfo] = useState(false);

    useEffect(() => {
      const r = store.get("coffee-collection");
      const parsed = r ? JSON.parse(r.value) : null;
      const list = parsed?.length ? parsed : COFFEES;
      setCoffees(list);
      if (!parsed?.length) store.set("coffee-collection", JSON.stringify(COFFEES));
      setLoading(false);
    }, []);

    const countries = [...new Set(coffees.map(c=>c.country))].sort();
    const procs = [...new Set(coffees.map(c=>c.processing))].sort();
    const roasts = [...new Set(coffees.map(c=>c.roastLevel))].sort();

    const filtered = coffees.filter(c => {
      const t = search.toLowerCase();
      return (!t || [c.name,c.roaster,c.country,c.variety,...(c.tastingNotes||[])].some(v=>v.toLowerCase().includes(t)))
        && (fCountry==="all"||c.country===fCountry)
        && (fProc==="all"||c.processing===fProc)
        && (fRoast==="all"||c.roastLevel===fRoast);
    });

    const toggleCompare = c => setCompare(prev =>
      prev.find(x=>x.id===c.id) ? prev.filter(x=>x.id!==c.id) : prev.length<3 ? [...prev,c] : prev
    );

    if (loading) return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:16,background:P.cream}},
      h("span",{style:{fontSize:44,animation:"pulse 1.5s ease infinite"}},"☕"),
      h("p",{style:{fontFamily:FD,fontSize:17,color:P.inkM}},"Collectie laden…")
    );

    return h("div",{style:{background:P.cream,minHeight:"100vh",color:P.ink}},
      // Header
      h("header",{style:{background:P.warm,borderBottom:`1px solid ${P.border}`,position:"sticky",top:0,zIndex:100,WebkitBackdropFilter:"blur(10px)",backdropFilter:"blur(10px)"}},
        h("div",{style:{maxWidth:900,margin:"0 auto",padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}},
          h("div",{style:{display:"flex",alignItems:"center",gap:10}},
            h("span",{style:{fontSize:22,color:P.accent}},"◉"),
            h("div",null,
              h("h1",{style:{fontFamily:FD,fontSize:18,fontWeight:700,margin:0,letterSpacing:"-0.4px"}},"Koffiebonenlogboek"),
              h("p",{style:{fontSize:12,color:P.inkM,margin:0}},coffees.length+" bonen")
            )
          ),
          h("div",{style:{display:"flex",gap:6}},
            h("button",{style:{fontSize:12,padding:"6px 14px",borderRadius:20,border:`1px solid ${P.border}`,background:view==="grid"?P.ink:"transparent",color:view==="grid"?"#fff":P.inkL,cursor:"pointer",fontWeight:500},onClick:()=>{setView("grid");setSelected(null);}},"Collectie"),
            compare.length>=2 && h("button",{style:{fontSize:12,padding:"6px 14px",borderRadius:20,border:"none",background:P.accent,color:"#fff",cursor:"pointer",fontWeight:500},onClick:()=>setView("compare")},`Vergelijk (${compare.length})`)
          )
        )
      ),

      // Grid view
      view==="grid" && !selected && h("main",{style:{maxWidth:900,margin:"0 auto",padding:"16px"}},
        // Search
        h("div",{style:{position:"relative",marginBottom:10}},
          h("span",{style:{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:17,color:P.inkM}},"⌕"),
          h("input",{style:{width:"100%",padding:"12px 36px 12px 42px",border:`1px solid ${P.border}`,borderRadius:12,fontSize:15,background:P.warm,color:P.ink,outline:"none"},placeholder:"Zoek op naam, brander, herkomst…",value:search,onChange:e=>setSearch(e.target.value)}),
          search && h("button",{style:{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",fontSize:15,color:P.inkM,cursor:"pointer"},onClick:()=>setSearch("")},"✕")
        ),
        // Filters
        h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}},
          h("select",{style:{padding:"7px 12px",border:`1px solid ${P.border}`,borderRadius:9,fontSize:13,background:P.warm,color:P.ink,outline:"none"},value:fCountry,onChange:e=>setFCountry(e.target.value)},
            h("option",{value:"all"},"Alle landen"),
            ...countries.map(c=>h("option",{key:c,value:c},flag(c)+" "+c))
          ),
          h("select",{style:{padding:"7px 12px",border:`1px solid ${P.border}`,borderRadius:9,fontSize:13,background:P.warm,color:P.ink,outline:"none"},value:fProc,onChange:e=>setFProc(e.target.value)},
            h("option",{value:"all"},"Alle verwerkingen"),
            ...procs.map(p=>h("option",{key:p,value:p},p))
          ),
          h("select",{style:{padding:"7px 12px",border:`1px solid ${P.border}`,borderRadius:9,fontSize:13,background:P.warm,color:P.ink,outline:"none"},value:fRoast,onChange:e=>setFRoast(e.target.value)},
            h("option",{value:"all"},"Alle brandingen"),
            ...roasts.map(r=>h("option",{key:r,value:r},r))
          )
        ),
        // Add banner
        h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",background:P.warm,border:`1px dashed ${P.border}`,borderRadius:12,cursor:"pointer",marginBottom:10},onClick:()=>setShowInfo(v=>!v)},
          h("span",{style:{width:28,height:28,borderRadius:"50%",background:P.accentL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:P.accent,fontWeight:600,flexShrink:0}}," + "),
          h("span",{style:{flex:1,fontSize:13,fontWeight:500,color:P.inkL}},"Nieuwe koffie toevoegen"),
          h("span",{style:{fontSize:11,color:P.inkM}},showInfo?"▲":"▼")
        ),
        showInfo && h("div",{style:{padding:"12px 16px",background:P.accentL,borderRadius:12,marginBottom:16}},
          h("p",{style:{fontSize:13,color:P.inkL,lineHeight:1.7}},"Stuur een foto van je koffiebonenzak in het Claude-project. Ik analyseer de boon, zoek alle informatie op en voeg het automatisch toe aan je logboek — compleet met zetrecepten voor je V60, B75 en Rancilio Silvia.")
        ),
        // Cards
        filtered.length===0
          ? h("div",{style:{textAlign:"center",padding:"60px 20px"}},
              h("span",{style:{fontSize:38,display:"block",marginBottom:12}},"☕"),
              h("p",{style:{fontFamily:FD,fontSize:17,fontWeight:500}},"Geen koffies gevonden")
            )
          : h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}},
              ...filtered.map((c,i)=>h(Card,{key:c.id,coffee:c,idx:i,onOpen:()=>{setSelected(c);setView("detail");setTab("info");},onCompare:()=>toggleCompare(c),comparing:!!compare.find(x=>x.id===c.id)}))
            )
      ),

      // Detail view
      view==="detail" && selected && h(Detail,{coffee:selected,tab,setTab,onBack:()=>{setView("grid");setSelected(null);}}),

      // Compare view
      view==="compare" && compare.length>=2 && h(Compare,{coffees:compare,onBack:()=>setView("grid"),onClear:()=>{setCompare([]);setView("grid");}})
    );
  }

  function Card({coffee:c,idx,onOpen,onCompare,comparing}) {
    const pc = procColor(c.processing);
    return h("div",{className:"fade-up",style:{background:P.card,borderRadius:14,overflow:"hidden",cursor:"pointer",border:`1px solid ${P.border}`,boxShadow:"0 1px 3px rgba(44,36,24,0.06)",animationDelay:`${idx*60}ms`},onClick:onOpen},
      h("div",{style:{height:5,background:roastGrad(c.roastLevel)}}),
      h("div",{style:{padding:16}},
        h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:7}},
          h("span",{style:{fontSize:12,color:P.inkM,fontWeight:500}},flag(c.country)+" "+c.country),
          h("span",{style:{fontSize:11,color:P.inkM,padding:"2px 9px",background:P.cream,borderRadius:7}},c.roastLevel)
        ),
        h("h3",{style:{fontFamily:FD,fontSize:16,fontWeight:600,margin:"0 0 2px",lineHeight:1.3}},c.name),
        h("p",{style:{fontSize:12,color:P.inkM,marginBottom:10}},c.roaster),
        h("div",{style:{display:"flex",gap:7,flexWrap:"wrap",marginBottom:10}},
          h("span",{style:{fontSize:11,padding:"2px 9px",borderRadius:7,border:"1px solid",background:pc.bg,color:pc.text,borderColor:pc.border,fontWeight:500}},c.processing),
          h("span",{style:{fontSize:11,padding:"2px 9px",borderRadius:7,background:"#F0EDE8",color:P.inkL}},c.variety)
        ),
        h("div",{style:{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}},
          ...(c.tastingNotes||[]).map((n,i)=>h("span",{key:i,style:{fontSize:11,padding:"2px 9px",borderRadius:18,background:P.cream,color:P.inkL,border:`1px solid ${P.border}`}},n))
        ),
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:10,borderTop:`1px solid ${P.border}`}},
          h("div",{style:{display:"flex",gap:9,fontSize:14,color:P.inkM}},
            h("span",{title:"V60"},"▽"),
            h("span",{title:"B75"},"⬡"),
            c.espresso && h("span",{title:"Espresso"},"◈")
          ),
          h("button",{style:{width:28,height:28,borderRadius:"50%",border:`1px solid ${comparing?P.accent:P.border}`,background:comparing?P.accent:"transparent",color:comparing?"#fff":P.inkM,cursor:"pointer",fontSize:12},onClick:e=>{e.stopPropagation();onCompare();}},comparing?"✓":"⟷")
        )
      )
    );
  }

  function Detail({coffee:c,tab,setTab,onBack}) {
    const tabs = [{id:"info",label:"Herkomst"},{id:"flavor",label:"Smaak"},{id:"v60",label:"V60"},{id:"b75",label:"B75"},...(c.espresso?[{id:"espresso",label:"Espresso"}]:[])];
    return h("main",{style:{maxWidth:700,margin:"0 auto",padding:"16px"}},
      h("button",{style:{fontSize:14,color:P.accent,background:"none",border:"none",cursor:"pointer",padding:"4px 0",fontWeight:500,marginBottom:14},onClick:onBack},"← Terug"),
      // Hero
      h("div",{style:{borderRadius:16,padding:"28px 22px",marginBottom:20,background:roastGrad(c.roastLevel)}},
        h("span",{style:{fontSize:12,color:"rgba(255,255,255,0.8)",display:"block",marginBottom:5}},flag(c.country)+" "+c.country+" · "+c.region),
        h("h2",{style:{fontFamily:FD,fontSize:24,fontWeight:700,color:"#fff",margin:"0 0 3px",lineHeight:1.2}},c.name),
        h("p",{style:{fontSize:14,color:"rgba(255,255,255,0.85)",margin:"0 0 12px"}},c.roaster),
        h("div",{style:{display:"flex",gap:7,flexWrap:"wrap"}},
          ...[`${c.roastLevel} — ${c.roastType}`,c.processing,c.variety].map((b,i)=>h("span",{key:i,style:{fontSize:11,padding:"3px 11px",borderRadius:18,background:"rgba(255,255,255,0.2)",color:"#fff",fontWeight:500}},b))
        )
      ),
      // Tabs
      h("div",{style:{display:"flex",gap:2,marginBottom:18,borderBottom:`1px solid ${P.border}`,overflowX:"auto",WebkitOverflowScrolling:"touch"}},
        ...tabs.map(t=>h("button",{key:t.id,style:{fontSize:13,padding:"8px 14px",border:"none",borderBottom:`2px solid ${tab===t.id?P.accent:"transparent"}`,background:"transparent",color:tab===t.id?P.accent:P.inkM,cursor:"pointer",fontWeight:500,whiteSpace:"nowrap"},onClick:()=>setTab(t.id)},t.label))
      ),
      // Tab content
      h("div",{className:"fade-up",key:tab},
        tab==="info" && h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
          ...[["Land",`${flag(c.country)} ${c.country}`],["Regio",c.region],["Producent",c.producer],["Hoogte",c.altitude],["Variëteit",c.variety],["Verwerking",c.processing]].map(([l,v])=>
            h("div",{key:l,style:{padding:12,background:P.warm,borderRadius:10,border:`1px solid ${P.border}`}},
              h("p",{style:{fontSize:10,fontWeight:600,color:P.inkM,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:3}},l),
              h("p",{style:{fontSize:14,fontWeight:500,color:P.ink}},v)
            )
          ),
          h("div",{key:"proc",style:{gridColumn:"1/-1",padding:12,background:P.warm,borderRadius:10,border:`1px solid ${P.border}`}},
            h("p",{style:{fontSize:10,fontWeight:600,color:P.inkM,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:5}},"Verwerkingsproces"),
            h("p",{style:{fontSize:13,color:P.inkL,lineHeight:1.7}},c.processingDetail)
          ),
          h("div",{key:"rest",style:{gridColumn:"1/-1",padding:12,background:P.warm,borderRadius:10,border:`1px solid ${P.border}`}},
            h("p",{style:{fontSize:10,fontWeight:600,color:P.inkM,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:5}},"Rusttijd"),
            h("p",{style:{fontSize:13,color:P.inkL,lineHeight:1.7}},c.restDays)
          )
        ),
        tab==="flavor" && h("div",null,
          h("div",{style:{display:"flex",gap:9,flexWrap:"wrap",marginBottom:18}},
            ...(c.tastingNotes||[]).map((n,i)=>h("span",{key:i,style:{fontSize:13,padding:"6px 16px",borderRadius:22,background:P.warm,border:`1px solid ${P.border}`,color:P.ink,fontWeight:500}},n))
          ),
          h("p",{style:{fontSize:14,lineHeight:1.8,color:P.inkL}},c.flavorDescription)
        ),
        tab==="v60" && h(BrewCard,{title:"Hario V60",icon:"▽",recipe:c.brewV60,color:"#E65100",showWhy:true}),
        tab==="b75" && h(BrewCard,{title:"Timemore B75",icon:"⬡",recipe:c.brewB75,color:"#2E7D32",showAgitation:true}),
        tab==="espresso" && c.espresso && h(EspressoCard,{recipe:c.espresso})
      )
    );
  }

  function BrewCard({title,icon,recipe,color,showWhy,showAgitation}) {
    return h("div",{style:{background:P.warm,borderRadius:14,padding:18,border:`1px solid ${P.border}`}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingLeft:12,borderLeft:`4px solid ${color}`}},
        h("span",{style:{fontSize:18}},icon),
        h("h3",{style:{fontFamily:FD,fontSize:17,fontWeight:600,margin:0}},title)
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:9,marginBottom:16}},
        ...[["Dosis",recipe.dose],["Water",recipe.water],["Temperatuur",recipe.temp],["Brouwtijd",recipe.time],["Maalstand",recipe.grindBricks]].map(([l,v])=>
          h("div",{key:l,style:{padding:"9px 11px",background:P.card,borderRadius:9,border:`1px solid ${P.border}`}},
            h("span",{style:{fontSize:9,fontWeight:600,color:P.inkM,textTransform:"uppercase",letterSpacing:"0.5px",display:"block",marginBottom:2}},l),
            h("span",{style:{fontSize:14,fontWeight:600,color:P.ink}},v)
          )
        )
      ),
      h("div",{style:{marginBottom:12}},
        h("p",{style:{fontSize:11,fontWeight:600,color:P.ink,textTransform:"uppercase",letterSpacing:"0.3px",marginBottom:5}},"Giettechniek"),
        h("p",{style:{fontSize:13,color:P.inkL,lineHeight:1.7}},recipe.technique)
      ),
      showWhy && recipe.whyThisTechnique && h("div",{style:{marginBottom:12}},
        h("p",{style:{fontSize:11,fontWeight:600,color:P.ink,textTransform:"uppercase",letterSpacing:"0.3px",marginBottom:5}},"Waarom deze methode?"),
        h("p",{style:{fontSize:13,color:P.inkL,lineHeight:1.7}},recipe.whyThisTechnique)
      ),
      showAgitation && recipe.agitation && h("div",null,
        h("p",{style:{fontSize:11,fontWeight:600,color:P.ink,textTransform:"uppercase",letterSpacing:"0.3px",marginBottom:5}},"Agitatie-advies"),
        h("p",{style:{fontSize:13,color:P.inkL,lineHeight:1.7}},recipe.agitation)
      )
    );
  }

  function EspressoCard({recipe:r}) {
    return h("div",{style:{background:P.warm,borderRadius:14,padding:18,border:`1px solid ${P.border}`}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingLeft:12,borderLeft:"4px solid #6A1B9A"}},
        h("span",{style:{fontSize:18}},"◈"),
        h("h3",{style:{fontFamily:FD,fontSize:17,fontWeight:600,margin:0}},"Espresso — Rancilio Silvia")
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:9,marginBottom:16}},
        ...[["Dosis",r.dose],["Opbrengst",r.yield],["Extractietijd",r.time],["Temperatuur",r.temp],["Maalstand",r.grindBricks]].map(([l,v])=>
          h("div",{key:l,style:{padding:"9px 11px",background:"#FFFFFF",borderRadius:9,border:`1px solid ${P.border}`}},
            h("span",{style:{fontSize:9,fontWeight:600,color:P.inkM,textTransform:"uppercase",letterSpacing:"0.5px",display:"block",marginBottom:2}},l),
            h("span",{style:{fontSize:14,fontWeight:600,color:P.ink}},v)
          )
        )
      ),
      h("p",{style:{fontSize:11,fontWeight:600,color:P.ink,textTransform:"uppercase",letterSpacing:"0.3px",marginBottom:5}},"Tips voor de Silvia"),
      h("p",{style:{fontSize:13,color:P.inkL,lineHeight:1.7}},r.tips)
    );
  }

  function Compare({coffees,onBack,onClear}) {
    const fields = [
      {label:"Brander",get:c=>c.roaster},{label:"Land",get:c=>`${flag(c.country)} ${c.country}`},
      {label:"Regio",get:c=>c.region},{label:"Hoogte",get:c=>c.altitude},
      {label:"Variëteit",get:c=>c.variety},{label:"Verwerking",get:c=>c.processing},
      {label:"Branding",get:c=>c.roastLevel},{label:"Type",get:c=>c.roastType},
      {label:"V60 maalstand",get:c=>c.brewV60?.grindBricks||"—"},{label:"B75 maalstand",get:c=>c.brewB75?.grindBricks||"—"},
    ];
    return h("main",{style:{maxWidth:700,margin:"0 auto",padding:"16px"}},
      h("div",{style:{display:"flex",gap:10,marginBottom:18}},
        h("button",{style:{fontSize:14,color:P.accent,background:"none",border:"none",cursor:"pointer",padding:"4px 0",fontWeight:500},onClick:onBack},"← Terug"),
        h("button",{style:{fontSize:14,color:"#C62828",background:"none",border:"none",cursor:"pointer",padding:"4px 0",fontWeight:500},onClick:onClear},"Wissen")
      ),
      h("h2",{style:{fontFamily:FD,fontSize:20,fontWeight:700,marginBottom:16}},"Vergelijking"),
      h("div",{style:{borderRadius:14,overflow:"hidden",border:`1px solid ${P.border}`,overflowX:"auto"}},
        h("div",{style:{display:"grid",gridTemplateColumns:`130px repeat(${coffees.length},1fr)`,minWidth:350}},
          h("div",{style:{background:P.warm}}),
          ...coffees.map(c=>h("div",{key:c.id,style:{padding:"12px 10px",background:roastGrad(c.roastLevel),borderLeft:`1px solid rgba(255,255,255,0.15)`}},
            h("strong",{style:{color:"#fff",fontSize:12,lineHeight:1.3,display:"block"}},c.name)
          ))
        ),
        ...fields.map((f,i)=>h("div",{key:f.label,style:{display:"grid",gridTemplateColumns:`130px repeat(${coffees.length},1fr)`,background:i%2===0?"#FAFAF8":"#fff",minWidth:350}},
          h("div",{style:{padding:"9px 12px",fontSize:10,fontWeight:600,color:P.inkM,textTransform:"uppercase",letterSpacing:"0.3px",borderRight:`1px solid ${P.border}`,background:P.warm,display:"flex",alignItems:"center"}},f.label),
          ...coffees.map(c=>h("div",{key:c.id,style:{padding:"9px 12px",fontSize:13,color:P.ink,borderRight:`1px solid ${P.border}`,display:"flex",alignItems:"center"}},f.get(c)||"—"))
        ))
      )
    );
  }

  // ─── Mount ───
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

  // ─── Service Worker (PWA offline support) ───
  if ("serviceWorker" in navigator) {
    const swCode = `
const CACHE = "koffie-v1";
const ASSETS = ["/"];
self.addEventListener("install", e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
self.addEventListener("fetch", e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
    `;
    const blob = new Blob([swCode], {type:"application/javascript"});
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  }
  </script>
</body>
</html>
